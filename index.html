<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #cba6f7;
        }

        .card {
            background: #313244;
            border-radius: 16px;
            padding: 36px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            min-width: 360px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #45475a;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #cba6f7;
        }

        button {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: #cba6f7;
            color: #1e1e2e;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover  { background: #b48fef; }
        button:active { transform: scale(0.97); }
        .card:hover{ transform: scale(1.05);}

        #result {
            font-size: 15px;
            color: #a6e3a1;
            min-height: 22px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>SabakaLang</h1>
        <p>SabakaLang - это простой и мощный язык программирования.</p>
            <p> На нём пишут самые различные гигачады, МГЕ братья и сабаки. </p>
</body>
</html>
